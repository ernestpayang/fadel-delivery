

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    container_name: fadel_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache et Broker Redis
  redis:
    image: redis:alpine
    container_name: fadel_redis
    ports:
      - "6379:6379"

  # API Backend Node.js
  api:
    build: .
    container_name: fadel_api
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
    depends_on:
      - db
      - redis

  # Proxy Inverse Nginx
  nginx:
    image: nginx:alpine
    container_name: fadel_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data: